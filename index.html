<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Plaza</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  display: flex;
}

#left {
  width: 45%;
  padding: 20px;
  border-right: 2px solid #2a2a44;
  position: relative;
}

#right {
  width: 55%;
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 5px 8px;
  margin-left: 5px;
  cursor: pointer;
}

input {
  padding: 8px;
  width: 100%;
  margin: 5px 0;
}

#suggestBox {
  background: #1c1c2e;
  border: 1px solid #333;
  position: absolute;
  width: calc(100% - 40px);
  max-height: 220px;
  overflow-y: auto;
  z-index: 999;
}

.suggestItem {
  padding: 8px;
  cursor: pointer;
}

.suggestItem:hover {
  background: #2a2a44;
}

.offer {
  background: #2a2a44;
  margin: 5px 0;
  padding: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="left">
  <h2>🐾 PS99 Trade Plaza</h2>

  <input id="petInput" placeholder="Search PS99 pets..." oninput="showSuggestions()">
  <div id="suggestBox"></div>

  <button onclick="createListing()">Post Pet</button>

  <div id="listings"></div>
</div>

<div id="right">
  <h2 id="title">Select a pet</h2>

  <div id="offerBox"></div>
  <div id="offers"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  arrayUnion,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDKED4gP_qjiUJFT8aJL4_Ydjqsx0oppM",
  authDomain: "ps99-trade-board.firebaseapp.com",
  projectId: "ps99-trade-board",
  storageBucket: "ps99-trade-board.firebasestorage.app",
  messagingSenderId: "983182657873",
  appId: "1:983182657873:web:5164ccdab414742ee86b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;
let mode = null;
let unsubscribeOffers = null;

let PETS = [];

/* ---------------- BIG GAMES API LOAD ---------------- */
async function loadPets() {
  try {
    const res = await fetch("https://ps99.biggamesapi.io/api/collection/Pets");
    const json = await res.json();

    PETS = json.data.map(p => p.configName);

  } catch (e) {
    console.log("API failed, fallback used");

    PETS = [
      "Huge Cat",
      "Huge Dog",
      "Huge Dragon",
      "Titanic Jelly",
      "Titanic Balloon Cat"
    ];
  }
}

function isValidPet(name) {
  return PETS.some(p => p.toLowerCase() === name.toLowerCase());
}

/* ---------------- AUTOFILL ---------------- */
window.showSuggestions = function () {
  const input = document.getElementById("petInput").value.toLowerCase();
  const box = document.getElementById("suggestBox");

  box.innerHTML = "";
  if (!input) return;

  const matches = PETS
    .filter(p => p.toLowerCase().includes(input))
    .slice(0, 10);

  matches.forEach(p => {
    const div = document.createElement("div");
    div.className = "suggestItem";
    div.innerText = p;

    div.onclick = () => {
      document.getElementById("petInput").value = p;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
};

/* ---------------- CREATE LISTING ---------------- */
window.createListing = async function () {
  const pet = document.getElementById("petInput").value;

  if (!isValidPet(pet)) {
    alert("Invalid pet. Please select from PS99 list.");
    return;
  }

  await addDoc(collection(db, "listings"), {
    pet,
    offers: [],
    createdAt: Date.now()
  });

  document.getElementById("petInput").value = "";
};

/* ---------------- LISTINGS ---------------- */
const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach((d) => {
    const data = d.data();

    html += `
      <div class="card">
        🐾 <b>${data.pet}</b>

        <div>
          <button onclick="openOffer('${d.id}')">➕</button>
          <button onclick="viewOffers('${d.id}')">✏</button>
          <button onclick="deleteListing('${d.id}')">🗑</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
});

/* ---------------- OFFER MODE ---------------- */
window.openOffer = function(id) {
  selectedId = id;
  mode = "offer";

  document.getElementById("title").innerText = "Make Offer";

  let html = "<p>Select pets:</p>";

  PETS.slice(0, 50).forEach(p => {
    html += `
      <label>
        <input type="checkbox" value="${p}"> ${p}
      </label><br>
    `;
  });

  html += `<br><button onclick="sendOffer()">Send Offer</button>`;

  document.getElementById("offerBox").innerHTML = html;
  document.getElementById("offers").innerHTML = "";
};

/* ---------------- SEND OFFER ---------------- */
window.sendOffer = async function () {
  const checkboxes = document.querySelectorAll("#offerBox input[type=checkbox]");
  const pets = Array.from(checkboxes)
    .filter(c => c.checked)
    .map(c => c.value);

  if (!pets.length || !pets.every(isValidPet)) {
    alert("Invalid offer.");
    return;
  }

  await updateDoc(doc(db, "listings", selectedId), {
    offers: arrayUnion({
      pets,
      time: Date.now(),
      status: "pending"
    })
  });
};

/* ---------------- VIEW OFFERS ---------------- */
window.viewOffers = function (id) {
  selectedId = id;
  mode = "view";

  document.getElementById("title").innerText = "Offers";
  document.getElementById("offerBox").innerHTML = "";

  if (unsubscribeOffers) unsubscribeOffers();

  const ref = doc(db, "listings", id);

  unsubscribeOffers = onSnapshot(ref, (snap) => {
    const data = snap.data();

    let html = "";

    data?.offers?.forEach((o, i) => {

      const actions = o.status === "pending"
        ? `
          <button onclick="acceptOffer(${i})">✔</button>
          <button onclick="declineOffer(${i})">❌</button>
        `
        : `<small>${o.status}</small>`;

      html += `
        <div class="offer">
          💬 ${o.pets.join(", ")}<br>
          <small>${new Date(o.time).toLocaleString()}</small>
          ${actions}
        </div>
      `;
    });

    document.getElementById("offers").innerHTML = html || "<p>No offers</p>";
  });
};

/* ---------------- ACCEPT / DECLINE ---------------- */
window.acceptOffer = async function(i) {
  const ref = doc(db, "listings", selectedId);
  const snap = await getDoc(ref);
  const data = snap.data();

  data.offers[i].status = "accepted";

  await updateDoc(ref, { offers: data.offers });
};

window.declineOffer = async function(i) {
  const ref = doc(db, "listings", selectedId);
  const snap = await getDoc(ref);
  const data = snap.data();

  data.offers[i].status = "declined";

  await updateDoc(ref, { offers: data.offers });
};

/* ---------------- DELETE ---------------- */
window.deleteListing = async function(id) {
  await deleteDoc(doc(db, "listings", id));

  selectedId = null;
  mode = null;

  if (unsubscribeOffers) unsubscribeOffers();

  document.getElementById("offerBox").innerHTML = "";
  document.getElementById("offers").innerHTML = "";
};

/* START */
loadPets();

</script>

</body>
</html>
