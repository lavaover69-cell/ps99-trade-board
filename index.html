<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Board</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  display: flex;
}

/* LEFT PANEL */
#leftPanel {
  width: 45%;
  padding: 20px;
  border-right: 2px solid #2a2a44;
}

/* RIGHT PANEL */
#rightPanel {
  width: 55%;
  padding: 20px;
}

/* LISTING CARD */
.card {
  background: #1c1c2e;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ICON BUTTONS */
.iconBtn {
  background: #2a2a44;
  border: none;
  color: white;
  padding: 6px 8px;
  margin-left: 5px;
  border-radius: 6px;
  cursor: pointer;
}

.iconBtn:hover {
  background: #3a3a66;
}

/* OFFER BOX */
.offer {
  background: #2a2a44;
  padding: 6px;
  margin: 5px 0;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div id="leftPanel">

<h2>🐾 PS99 Trade Board</h2>

<input id="petName" placeholder="Post a pet">
<button onclick="createListing()">Post</button>

<div id="listings"></div>

</div>

<!-- RIGHT SIDE -->
<div id="rightPanel">

<h2 id="title">Select a listing</h2>
<div id="controls"></div>
<div id="offers"></div>

</div>

<script>

let listings = [];
let selectedIndex = null;
let viewingOffers = false;

// CREATE LISTING
function createListing() {
  const pet = document.getElementById("petName").value;
  if (!pet) return;

  listings.push({
    pet,
    offers: [],
    owner: "you" // simplified (no login yet)
  });

  document.getElementById("petName").value = "";
  renderListings();
}

// RENDER LISTINGS (LEFT SIDE)
function renderListings() {
  let html = "";

  listings.forEach((l, i) => {
    html += `
      <div class="card">
        🐾 <b>${l.pet}</b>

        <div>
          <button class="iconBtn" onclick="proposeOffer(${i})">➕</button>
          <button class="iconBtn" onclick="viewOffers(${i})">✏</button>
          <button class="iconBtn" onclick="deleteListing(${i})">🗑</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
}

// ➕ PROPOSE OFFER MODE
function proposeOffer(index) {
  selectedIndex = index;
  viewingOffers = false;

  document.getElementById("title").innerText =
    "Propose Offer for: " + listings[index].pet;

  document.getElementById("controls").innerHTML = `
    <button class="iconBtn" onclick="submitOffer()">Send Offer</button>
  `;

  document.getElementById("offers").innerHTML =
    "<p>Click send after agreeing offer details externally.</p>";
}

// ✏ VIEW OFFERS (OWNER ONLY MODE)
function viewOffers(index) {
  selectedIndex = index;
  viewingOffers = true;

  document.getElementById("title").innerText =
    "Offers for: " + listings[index].pet;

  renderOffers();
}

// 🗑 DELETE LISTING
function deleteListing(index) {
  listings.splice(index, 1);
  renderListings();

  document.getElementById("title").innerText = "Select a listing";
  document.getElementById("offers").innerHTML = "";
  document.getElementById("controls").innerHTML = "";
}

// SUBMIT OFFER (simple placeholder system)
function submitOffer() {
  if (selectedIndex === null) return;

  const fakeOffer = "New offer received (placeholder)";

  listings[selectedIndex].offers.push(fakeOffer);

  alert("Offer sent!");
}

// SHOW OFFERS
function renderOffers() {
  if (!viewingOffers || selectedIndex === null) return;

  let html = "";

  listings[selectedIndex].offers.forEach(o => {
    html += `<div class="offer">💬 ${o}</div>`;
  });

  document.getElementById("offers").innerHTML = html;
}

renderListings();

</script>

</body>
</html>
