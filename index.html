<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Plaza</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  display: flex;
}

#left {
  width: 45%;
  padding: 20px;
  position: relative;
  border-right: 2px solid #2a2a44;
}

#right {
  width: 55%;
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 5px 8px;
  cursor: pointer;
}

input {
  padding: 8px;
  width: 100%;
  margin: 5px 0;
}

#suggestBox {
  position: absolute;
  width: calc(100% - 40px);
  background: #1c1c2e;
  border: 1px solid #333;
  max-height: 220px;
  overflow-y: auto;
  z-index: 999;
}

.suggestItem {
  padding: 8px;
  cursor: pointer;
}

.suggestItem:hover {
  background: #2a2a44;
}

.offer {
  background: #2a2a44;
  margin: 5px 0;
  padding: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="left">
  <h2>🐾 PS99 Trade Plaza</h2>

  <button onclick="logout()">Logout</button>

  <input id="petInput" placeholder="Search PS99 pet..." oninput="showSuggestions()">
  <div id="suggestBox"></div>

  <button onclick="createListing()">Post Pet</button>

  <div id="listings"></div>
</div>

<div id="right">
  <h2 id="title">Select a pet</h2>

  <div id="offerBox"></div>
  <div id="offers"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ps99-trade-board.firebaseapp.com",
  projectId: "ps99-trade-board"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user = null;
let PETS = [];
let selectedId = null;
let unsubscribeOffers = null;

/* ---------------- AUTH LOCK ---------------- */
onAuthStateChanged(auth, (u) => {
  if (!u) {
    window.location.href = "login.html";
  } else {
    user = u;
    console.log("Logged in:", u.email);
  }
});

/* ---------------- LOGOUT ---------------- */
window.logout = async function () {
  await signOut(auth);
  window.location.href = "login.html";
};

/* ---------------- PET API ---------------- */
async function loadPets() {
  try {
    const res = await fetch("https://ps99.biggamesapi.io/api/collection/Pets");
    const json = await res.json();

    PETS = (json.data || [])
      .map(p => p.configName)
      .filter(Boolean);

    PETS = [...new Set(PETS)].sort();

  } catch {
    PETS = ["Huge Cat", "Huge Dog", "Titanic Jelly"];
  }
}

function isValidPet(name) {
  return PETS.some(p => p.toLowerCase() === name.toLowerCase());
}

/* ---------------- AUTOFILL ---------------- */
window.showSuggestions = function () {
  const input = document.getElementById("petInput").value.toLowerCase();
  const box = document.getElementById("suggestBox");

  box.innerHTML = "";
  if (!input) return;

  PETS.filter(p => p.toLowerCase().includes(input))
    .slice(0, 12)
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "suggestItem";
      div.innerText = p;
      div.onclick = () => {
        document.getElementById("petInput").value = p;
        box.innerHTML = "";
      };
      box.appendChild(div);
    });
};

/* ---------------- CREATE LISTING ---------------- */
window.createListing = async function () {
  const pet = document.getElementById("petInput").value;

  if (!user) return alert("Not logged in");
  if (!isValidPet(pet)) return alert("Invalid pet");

  await addDoc(collection(db, "listings"), {
    pet,
    offers: [],
    ownerId: user.uid,
    ownerEmail: user.email,
    createdAt: Date.now()
  });

  document.getElementById("petInput").value = "";
};

/* ---------------- LISTINGS ---------------- */
const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach(d => {
    const data = d.data();

    html += `
      <div class="card">
        🐾 <b>${data.pet}</b>
        <div>
          <button onclick="openOffer('${d.id}')">➕</button>
          <button onclick="viewOffers('${d.id}')">✏</button>

          ${
            data.ownerId === user?.uid
              ? `<button onclick="deleteListing('${d.id}')">🗑</button>`
              : ""
          }
        </div>
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
});

/* ---------------- OFFER SYSTEM ---------------- */
window.openOffer = function(id) {
  selectedId = id;

  document.getElementById("title").innerText = "Make Offer";

  document.getElementById("offerBox").innerHTML = `
    <input id="offerInput" placeholder="Type pet name..." oninput="offerSuggest()">
    <div id="offerSuggest"></div>
    <button onclick="sendOffer()">Send Offer</button>
  `;

  document.getElementById("offers").innerHTML = "";
};

window.sendOffer = async function () {
  const pet = document.getElementById("offerInput").value;

  if (!isValidPet(pet)) return alert("Invalid pet");

  await updateDoc(doc(db, "listings", selectedId), {
    offers: arrayUnion({
      pets: [pet],
      time: Date.now(),
      from: user.email,
      status: "pending"
    })
  });
};

window.viewOffers = function (id) {
  selectedId = id;

  const ref = doc(db, "listings", id);

  if (unsubscribeOffers) unsubscribeOffers();

  unsubscribeOffers = onSnapshot(ref, snap => {
    const data = snap.data();

    document.getElementById("offers").innerHTML =
      data?.offers?.map(o => `
        <div class="offer">
          💬 ${o.pets.join(", ")}<br>
          <small>${o.from}</small><br>
          ${o.status}
        </div>
      `).join("") || "<p>No offers</p>";
  });
};

window.deleteListing = async function(id) {
  await deleteDoc(doc(db, "listings", id));
};

loadPets();

</script>

</body>
</html>
