<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Board</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  display: flex;
}

#left {
  width: 45%;
  padding: 20px;
  border-right: 2px solid #2a2a44;
}

#right {
  width: 55%;
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  margin-left: 5px;
  padding: 5px 8px;
  cursor: pointer;
}

.offer {
  background: #2a2a44;
  margin: 5px 0;
  padding: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="left">
  <h2>🐾 PS99 Trade Board</h2>

  <input id="username" placeholder="Username"><br><br>

  <input id="pet" placeholder="Pet name">
  <button onclick="createListing()">Post</button>

  <div id="listings"></div>
</div>

<div id="right">
  <h2 id="title">Select a pet</h2>

  <div id="offerBox"></div>
  <div id="offers"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  updateDoc,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDKED4gP_qjiUJFT8aJL4_Ydjqsx0oppM",
  authDomain: "ps99-trade-board.firebaseapp.com",
  projectId: "ps99-trade-board",
  storageBucket: "ps99-trade-board.firebasestorage.app",
  messagingSenderId: "983182657873",
  appId: "1:983182657873:web:5164ccdab414742ee86b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;

// CREATE LISTING
window.createListing = async function () {
  const pet = document.getElementById("pet").value;
  const user = document.getElementById("username").value;

  if (!pet || !user) return;

  await addDoc(collection(db, "listings"), {
    pet,
    user,
    offers: [],
    createdAt: serverTimestamp()
  });

  document.getElementById("pet").value = "";
}

// LOAD LISTINGS LIVE
const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();

    html += `
      <div class="card">
        🐾 <b>${data.pet}</b>
        <div>
          <button onclick="openOffer('${docSnap.id}')">➕</button>
          <button onclick="viewOffers('${docSnap.id}')">✏</button>
          <button onclick="deleteListing('${docSnap.id}')">🗑</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
});

// OPEN OFFER BOX
window.openOffer = function(id) {
  selectedId = id;

  document.getElementById("title").innerText = "Send Offer";

  document.getElementById("offerBox").innerHTML = `
    <input id="offerInput" placeholder="Your offer">
    <button onclick="sendOffer()">Send</button>
  `;
}

// SEND OFFER
window.sendOffer = async function () {
  const offer = document.getElementById("offerInput").value;
  if (!offer || !selectedId) return;

  const ref = doc(db, "listings", selectedId);

  await updateDoc(ref, {
    offers: arrayUnion({
      text: offer,
      time: Date.now()
    })
  });

  document.getElementById("offerInput").value = "";
}

// VIEW OFFERS
window.viewOffers = async function(id) {
  selectedId = id;

  const ref = doc(db, "listings", id);
  const snap = await import("https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js");

  const dataSnap = await getDoc(ref);
  const data = dataSnap.data();

  document.getElementById("title").innerText = "Offers";

  let html = "";

  if (data.offers) {
    data.offers.forEach(o => {
      html += `<div class="offer">💬 ${o.text}</div>`;
    });
  }

  document.getElementById("offers").innerHTML = html;
}

// DELETE
window.deleteListing = async function(id) {
  await deleteDoc(doc(db, "listings", id));
}

</script>

</body>
</html>
