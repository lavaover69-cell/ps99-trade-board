<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Board</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  text-align: center;
}

input, button {
  padding: 8px;
  margin: 5px;
}

.card {
  background: #1c1c2e;
  width: 320px;
  margin: 10px auto;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.offer {
  background: #2a2a44;
  margin: 5px;
  padding: 5px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h1>🐾 PS99 Trade Board</h1>

<h3>Create a Pet Listing</h3>
<input id="petName" placeholder="Pet name">
<button onclick="createListing()">Post Pet</button>

<hr>

<h3>Listings</h3>
<div id="listings"></div>

<hr>

<h3 id="selectedTitle">Select a pet listing</h3>

<div id="offerSection" style="display:none;">
  <input id="offerInput" placeholder="Your offer">
  <button onclick="addOffer()">Send Offer</button>
</div>

<div id="offers"></div>

<script>
let listings = [];
let selectedIndex = null;

function createListing() {
  const pet = document.getElementById("petName").value;
  if (!pet) return;

  listings.push({
    pet: pet,
    offers: []
  });

  document.getElementById("petName").value = "";
  renderListings();
}

function renderListings() {
  let html = "";

  listings.forEach((l, index) => {
    html += `
      <div class="card" onclick="selectListing(${index})">
        🐾 <b>${l.pet}</b><br>
        Offers: ${l.offers.length}
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
}

function selectListing(index) {
  selectedIndex = index;

  document.getElementById("selectedTitle").innerText =
    "Trading: " + listings[index].pet;

  document.getElementById("offerSection").style.display = "block";

  renderOffers();
}

function addOffer() {
  const offer = document.getElementById("offerInput").value;
  if (!offer || selectedIndex === null) return;

  listings[selectedIndex].offers.push(offer);

  document.getElementById("offerInput").value = "";

  renderOffers();
  renderListings();
}

function renderOffers() {
  if (selectedIndex === null) return;

  let html = "";

  listings[selectedIndex].offers.forEach(o => {
    html += `<div class="offer">💬 ${o}</div>`;
  });

  document.getElementById("offers").innerHTML = html;
}
</script>

</body>
</html>
