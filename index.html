<!DOCTYPE html>
<html>
<head>
<title>PS99 Trade Plaza</title>

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  margin: 0;
  display: flex;
}

#left {
  width: 45%;
  padding: 20px;
  border-right: 2px solid #2a2a44;
}

#right {
  width: 55%;
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 5px 8px;
  margin-left: 5px;
  cursor: pointer;
}

input, select {
  padding: 6px;
  width: 100%;
  margin: 5px 0;
}

.offer {
  background: #2a2a44;
  margin: 5px 0;
  padding: 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="left">
  <h2>🐾 PS99 Trade Plaza</h2>

  <input id="search" placeholder="Search pets..." oninput="filterPets()">

  <select id="petSelect"></select>

  <button onclick="createListing()">Post Pet</button>

  <div id="listings"></div>
</div>

<div id="right">
  <h2 id="title">Select a pet</h2>

  <div id="offerBox"></div>
  <div id="offers"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  orderBy,
  updateDoc,
  arrayUnion,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDKED4gP_qjiUJFT8aJL4_Ydjqsx0oppM",
  authDomain: "ps99-trade-board.firebaseapp.com",
  projectId: "ps99-trade-board",
  storageBucket: "ps99-trade-board.firebasestorage.app",
  messagingSenderId: "983182657873",
  appId: "1:983182657873:web:5164ccdab414742ee86b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedId = null;
let mode = null;
let unsubscribeOffers = null;

let PETS = [];

/* ---------------- LIVE WIKI/API LOAD ---------------- */
/*
  We use a community wiki-style JSON endpoint pattern.
  If one source fails, we fallback safely.
*/

async function loadPets() {
  try {
    // Primary: wiki-style structured endpoint (community data mirror style)
    const res = await fetch("https://raw.githubusercontent.com/placeholder-ps99/pets-database/main/pets.json");

    if (!res.ok) throw new Error("Primary failed");

    PETS = await res.json();
  } catch (e) {
    console.log("Primary API failed, using fallback");

    // fallback mini dataset so UI NEVER breaks
    PETS = [
      "Huge Cat",
      "Huge Dog",
      "Huge Dragon",
      "Titanic Jelly",
      "Titanic Balloon Cat",
      "Rainbow Unicorn"
    ];
  }

  renderPets(PETS);
}

function getName(p) {
  return typeof p === "string" ? p : p.name;
}

function renderPets(list) {
  const select = document.getElementById("petSelect");
  select.innerHTML = "";

  list.forEach(p => {
    const name = getName(p);
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });
}

window.filterPets = function () {
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = PETS.filter(p =>
    getName(p).toLowerCase().includes(q)
  );

  renderPets(filtered);
};

/* ---------------- CREATE LISTING ---------------- */
window.createListing = async function () {
  const pet = document.getElementById("petSelect").value;

  await addDoc(collection(db, "listings"), {
    pet,
    offers: [],
    createdAt: Date.now()
  });
}

/* ---------------- LISTINGS ---------------- */
const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));

onSnapshot(q, (snapshot) => {
  let html = "";

  snapshot.forEach((d) => {
    const data = d.data();

    html += `
      <div class="card">
        🐾 <b>${data.pet}</b>

        <div>
          <button onclick="openOffer('${d.id}')">➕</button>
          <button onclick="viewOffers('${d.id}')">✏</button>
          <button onclick="deleteListing('${d.id}')">🗑</button>
        </div>
      </div>
    `;
  });

  document.getElementById("listings").innerHTML = html;
});

/* ---------------- OFFER MODE ---------------- */
window.openOffer = function(id) {
  selectedId = id;
  mode = "offer";

  document.getElementById("title").innerText = "Make Offer";

  document.getElementById("offerBox").innerHTML = `
    <select id="offerSelect" multiple size="6"></select>
    <button onclick="sendOffer()">Send Offer</button>
  `;

  const select = document.getElementById("offerSelect");

  PETS.forEach(p => {
    const name = getName(p);
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    select.appendChild(opt);
  });

  document.getElementById("offers").innerHTML = "";
}

/* ---------------- SEND OFFER ---------------- */
window.sendOffer = async function () {
  if (mode !== "offer") return;

  const select = document.getElementById("offerSelect");
  const pets = Array.from(select.selectedOptions).map(o => o.value);

  if (!pets.length) return;

  await updateDoc(doc(db, "listings", selectedId), {
    offers: arrayUnion({
      pets,
      time: Date.now(),
      status: "pending"
    })
  });
}

/* ---------------- VIEW OFFERS ---------------- */
window.viewOffers = function (id) {
  selectedId = id;
  mode = "view";

  document.getElementById("title").innerText = "Offers";
  document.getElementById("offerBox").innerHTML = "";

  if (unsubscribeOffers) unsubscribeOffers();

  const ref = doc(db, "listings", id);

  unsubscribeOffers = onSnapshot(ref, (snap) => {
    const data = snap.data();

    let html = "";

    if (data?.offers) {
      data.offers.forEach((o, i) => {

        const actions = o.status === "pending"
          ? `
            <button onclick="acceptOffer(${i})">✔</button>
            <button onclick="declineOffer(${i})">❌</button>
          `
          : `<small>${o.status}</small>`;

        html += `
          <div class="offer">
            💬 ${o.pets.join(", ")}<br>
            <small>${new Date(o.time).toLocaleString()}</small>
            ${actions}
          </div>
        `;
      });
    } else {
      html = "<p>No offers yet</p>";
    }

    document.getElementById("offers").innerHTML = html;
  });
}

/* ---------------- ACCEPT / DECLINE ---------------- */
window.acceptOffer = async function(i) {
  const ref = doc(db, "listings", selectedId);
  const snap = await getDoc(ref);
  const data = snap.data();

  data.offers[i].status = "accepted";

  await updateDoc(ref, { offers: data.offers });
}

window.declineOffer = async function(i) {
  const ref = doc(db, "listings", selectedId);
  const snap = await getDoc(ref);
  const data = snap.data();

  data.offers[i].status = "declined";

  await updateDoc(ref, { offers: data.offers });
}

/* ---------------- DELETE ---------------- */
window.deleteListing = async function(id) {
  await deleteDoc(doc(db, "listings", id));

  selectedId = null;
  mode = null;

  if (unsubscribeOffers) unsubscribeOffers();

  document.getElementById("offerBox").innerHTML = "";
  document.getElementById("offers").innerHTML = "";
}

loadPets();

</script>

</body>
</html>
